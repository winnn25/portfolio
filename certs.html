<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certifications</title>
  <link rel="stylesheet" href="style.css" />
  <link
      rel="stylesheet"
      href="https://site-assets.fontawesome.com/releases/v6.7.2/css/all.css"
    />
</head>

<body class="unveil-certs">
  <!-- Global navbar (same as Home/Projects) -->
  <div class="container">
    <div id="navbar"></div>
  </div>

  <main class="unveil-shell" id="unveilShell">
<section class="unveil-main">
      <aside class="unveil-index" aria-label="Certificate index">
        <div class="unveil-index-head">
          <div class="unveil-kicker">CERTIFICATIONS</div>

          <!-- Category pills (defaults to All). Filters affect BOTH the list and the 3D stack. -->
          <div class="unveil-pills" role="tablist" aria-label="Certificate categories">
  <button class="unveil-pill unveil-pill--active" type="button" data-filter="all" data-label="All" aria-selected="true">♾️</button>
  <button class="unveil-pill" type="button" data-filter="ai" data-label="AI / ML" aria-selected="false">🧠</button>
  <button class="unveil-pill" type="button" data-filter="data" data-label="Data Analysis" aria-selected="false">📊</button>
  <button class="unveil-pill" type="button" data-filter="swe" data-label="Software Eng" aria-selected="false">💻</button>
  <button class="unveil-pill" type="button" data-filter="webapp" data-label="Web / App Dev" aria-selected="false">📱</button>
  <button class="unveil-pill" type="button" data-filter="other" data-label="Others" aria-selected="false">✨</button>
</div>
          </div>

        <div class="unveil-list" id="certList">
          <!-- The list is the “index”. Hover/focus to bring a card to front. -->

          <button class="unveil-item" type="button" data-preview="images/certs/atlassian-agile-project-management-professional-certificate-atlassian.jpg">
            <span class="unveil-no">01</span>
            <span class="unveil-name">Atlassian Agile Project Management Professional Certificate</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/become-a-react-native-developer-linkedin.jpg">
            <span class="unveil-no">02</span>
            <span class="unveil-name">Become a React Native Developer</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/career-essentials-in-generative-ai-microsoft-and-linkedin.jpg">
            <span class="unveil-no">03</span>
            <span class="unveil-name">Career Essentials in Generative AI</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/machine-learning-with-python-professional-certificate-anaconda.jpg">
            <span class="unveil-no">04</span>
            <span class="unveil-name">Machine Learning with Python Professional Certificate</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/generative-ai-linkedin.jpg">
            <span class="unveil-no">05</span>
            <span class="unveil-name">Generative AI</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/generative-ai-professional-certificate-snowflake.jpg">
            <span class="unveil-no">06</span>
            <span class="unveil-name">Generative AI Professional Certificate</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/it-leadership-professional-certificate-servicenow.jpg">
            <span class="unveil-no">07</span>
            <span class="unveil-name">IT Leadership Professional Certificate</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/boost-your-productivity-with-ai-tools-linkedin.jpg">
            <span class="unveil-no">08</span>
            <span class="unveil-name">Boost Your Productivity with AI Tools</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/career-essentials-in-data-analysis-microsoft-and-linkedin.jpg">
            <span class="unveil-no">09</span>
            <span class="unveil-name">Career Essentials in Data Analysis</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/career-essentials-in-github-professional-certificate-github.jpg">
            <span class="unveil-no">10</span>
            <span class="unveil-name">Career Essentials in GitHub Professional Certificate</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/data-fundamentals-ibm.jpg">
            <span class="unveil-no">11</span>
            <span class="unveil-name">Data Fundamentals</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/databricks-fundamentals-databricks.jpg">
            <span class="unveil-no">12</span>
            <span class="unveil-name">Databricks Fundamentals</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/introduction-to-artificial-intelligence-linkedin.jpg">
            <span class="unveil-no">13</span>
            <span class="unveil-name">Introduction to Artificial Intelligence</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/public-speaking-skills-professional-certificate-toastmasters-international.jpg">
            <span class="unveil-no">14</span>
            <span class="unveil-name">Public Speaking Skills Professional Certificate</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/ux-design-fundamentals-ux-design-institute.jpg">
            <span class="unveil-no">15</span>
            <span class="unveil-name">UX Design Fundamentals</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/complete-guide-to-power-bi-for-data-analysts-linkedin.jpg">
            <span class="unveil-no">16</span>
            <span class="unveil-name">Complete Guide to Power BI for Data Analysts</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/sql-for-data-analysis-linkedin.jpg">
            <span class="unveil-no">17</span>
            <span class="unveil-name">SQL for Data Analysis</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/career-essentials-in-software-development-microsoft-and-linkedin.jpg">
            <span class="unveil-no">18</span>
            <span class="unveil-name">Career Essentials in Software Development</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/professional-soft-skills-learning-pathway-linkedin.jpg">
            <span class="unveil-no">19</span>
            <span class="unveil-name">Professional Soft Skills Learning Pathway</span>
          </button>

          <button class="unveil-item" type="button" data-preview="images/certs/aws-cloud-practitioner-essentials-aws.jpg">
            <span class="unveil-no">20</span>
            <span class="unveil-name">AWS Cloud Practitioner Essentials</span>
          </button>
        </div>
      </aside>

      <!-- 3D “stack” stage (UNVEIL-like). JS will populate cards based on the list above. -->
      
      <div class="unveil-stage3d" id="stage3d" aria-label="3D certificate stack">
        <div class="unveil-viewport" id="viewport3d">
          <div class="unveil-scene" id="scene3d"></div>
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
  <script src="certs3d.js"></script>
</body>

</html>
